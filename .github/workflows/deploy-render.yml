name: Deploy to Render on push

# Render "Public Git Repository" connections don't auto-deploy, so this hits the
# service's Deploy Hook after every push to main. Setup (one time):
#   Render -> fx-tracker -> Settings -> Deploy Hook -> copy the URL
#   GitHub -> repo Settings -> Secrets and variables -> Actions ->
#     New secret: RENDER_DEPLOY_HOOK = that URL
on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set - skipping (deploy manually in Render)."
            exit 0
          fi
          curl -fsS "$HOOK" > /dev/null && echo "Render deploy triggered."
