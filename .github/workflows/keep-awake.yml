name: Keep Render awake

# Render's free tier spins the service down after ~15 min idle, so the next
# visitor waits ~30-50s for a cold start. Pinging /healthz every ~10 min keeps
# it warm, so the site loads instantly. /healthz is auth-exempt and skips the
# redirect, returning 200 directly. (Public repo => unlimited Actions minutes;
# one always-on service fits inside Render's 750 free instance-hours/month.)
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (cron is UTC)
  workflow_dispatch: {}       # allow a manual ping from the Actions tab

# Don't pile up overlapping runs if a tick is delayed.
concurrency:
  group: keep-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the health check
        run: |
          code=$(curl -fsS --max-time 40 -o /dev/null -w "%{http_code}" https://wandergrade.com/healthz) \
            && echo "pinged wandergrade.com/healthz -> HTTP $code at $(date -u)" \
            || { echo "ping failed (service may be cold-starting)"; exit 0; }
