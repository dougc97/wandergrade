<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" fill="none" stroke="#7f8b96" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- paper plane with dashed trail -->
  <g transform="translate(60,60) rotate(-8)">
    <path d="M0 26 L74 0 L34 40 Z"/>
    <path d="M34 40 L30 56 L44 34"/>
    <path d="M-72 64 C -40 56, -24 44, -6 30" stroke-dasharray="6 8"/>
  </g>
  <!-- hot-air balloon -->
  <g transform="translate(560,90)">
    <ellipse cx="0" cy="0" rx="34" ry="40"/>
    <path d="M-34 4 C -20 28, 20 28, 34 4"/>
    <path d="M-14 38 L-9 62 M14 38 L9 62"/>
    <rect x="-12" y="62" width="24" height="18" rx="3"/>
  </g>
  <!-- Eiffel tower -->
  <g transform="translate(150,420)">
    <path d="M0 0 C 4 40, 14 78, 38 110 M0 0 C -4 40, -14 78, -38 110"/>
    <path d="M-16 58 L16 58 M-26 86 L26 86"/>
    <path d="M-38 110 C -12 92, 12 92, 38 110"/>
  </g>
  <!-- torii gate -->
  <g transform="translate(620,360) rotate(3)">
    <path d="M-44 0 C -10 -10, 10 -10, 44 0"/>
    <path d="M-50 6 L50 6 M-36 22 L36 22"/>
    <path d="M-30 6 L-30 78 M30 6 L30 78"/>
  </g>
  <!-- pyramids + sun -->
  <g transform="translate(330,210)">
    <path d="M-60 40 L-22 -12 L16 40 Z"/>
    <path d="M4 40 L34 0 L64 40"/>
    <circle cx="64" cy="-22" r="12"/>
  </g>
  <!-- Mt Fuji -->
  <g transform="translate(120,660)">
    <path d="M-64 36 C -30 -18, -16 -34, 0 -34 C 16 -34, 30 -18, 64 36"/>
    <path d="M-20 -10 L-10 -2 L0 -12 L10 -2 L20 -10"/>
  </g>
  <!-- compass -->
  <g transform="translate(420,480) rotate(-10)">
    <circle cx="0" cy="0" r="34"/>
    <path d="M0 -34 L0 -42 M0 34 L0 42 M-34 0 L-42 0 M34 0 L42 0"/>
    <path d="M-12 12 L18 -18 L4 4 Z"/>
  </g>
  <!-- suitcase with sticker -->
  <g transform="translate(640,620) rotate(6)">
    <rect x="-34" y="-24" width="68" height="50" rx="8"/>
    <path d="M-12 -24 L-12 -36 L12 -36 L12 -24"/>
    <circle cx="12" cy="-2" r="8"/>
  </g>
  <!-- sailboat + waves -->
  <g transform="translate(300,610) rotate(-4)">
    <path d="M0 -42 L0 6 M0 -42 L30 0 L2 0 M-3 -28 L-22 0 L-4 0"/>
    <path d="M-30 8 L30 8 L20 22 L-20 22 Z"/>
    <path d="M-52 30 C -42 24, -32 24, -22 30 M-6 32 C 4 26, 14 26, 24 32"/>
  </g>
  <!-- palm tree -->
  <g transform="translate(480,700) rotate(2)">
    <path d="M0 0 C 4 -22, 4 -38, -2 -54"/>
    <path d="M-2 -54 C -18 -64, -32 -62, -42 -52 C -28 -56, -12 -54, -2 -54 Z"/>
    <path d="M-2 -54 C 8 -68, 22 -70, 34 -62 C 20 -62, 6 -58, -2 -54 Z"/>
    <path d="M-2 -54 C -14 -72, -6 -84, 6 -88 C -2 -78, -2 -66, -2 -54 Z"/>
  </g>
  <!-- camera -->
  <g transform="translate(220,260) rotate(-6)">
    <rect x="-30" y="-16" width="60" height="40" rx="6"/>
    <circle cx="0" cy="4" r="12"/>
    <path d="M-12 -16 L-8 -24 L8 -24 L12 -16"/>
  </g>
  <!-- location pin -->
  <g transform="translate(700,230) rotate(8)">
    <path d="M0 38 C -22 12, -26 -4, -26 -12 A 26 26 0 1 1 26 -12 C 26 -4, 22 12, 0 38 Z"/>
    <circle cx="0" cy="-12" r="9"/>
  </g>
  <!-- dashed route with stops -->
  <g transform="translate(40,300)">
    <path d="M0 0 C 40 -30, 80 30, 120 0 C 150 -22, 180 -10, 200 -30" stroke-dasharray="5 9"/>
    <circle cx="0" cy="0" r="4"/>
    <circle cx="200" cy="-30" r="4"/>
  </g>
</svg>
